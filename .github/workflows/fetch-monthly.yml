name: Monthly benchmark refresh

on:
  schedule:
    # 08:00 UTC on the 1st of every month
    - cron: "0 8 1 * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run fetch:all
      - name: Open PR if data changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "data: monthly benchmark refresh"
          title: "Monthly benchmark refresh"
          body: |
            Automated monthly pull of non-deterministic leaderboards
            (Arena, AlpacaEval, Arena-Hard, WildBench, LiveBench).

            Diff is just the JSON files under `data/scores/`.
          branch: data/monthly-refresh
          add-paths: data/scores/**
          delete-branch: true
